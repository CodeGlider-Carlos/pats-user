---
deployment:
  tasks:
    # Copy public/ contents to the subdomain document root
    - /bin/cp -R public/. /home2/monologi/userpats.codeglider.com.mx/public

    # Patch index.php so it can find the app files in ~/user-pats/
    - /bin/sed -i "s|__DIR__.'/../|__DIR__.'/../user-pats/|g" /home2/monologi/userpats.codeglider.com.mx/index.php

    # Install production Composer dependencies
    - /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
